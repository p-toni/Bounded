name: CI

on:
  push:
  pull_request:

jobs:
  contracts-and-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
      - name: Install engine deps
        run: |
          cd engine-ruby
          bundle install
      - name: Validate schemas
        run: make test-schemas
      - name: Run engine tests
        run: make test-engine
      - name: Replay fixture checks
        run: make test-replay

  rails-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geometry_gym_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geometry_gym_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
      - name: Install rails deps
        run: |
          cd rails-app
          bundle install
      - name: Prepare test database
        run: |
          cd rails-app
          bundle exec rails db:prepare
      - name: Run rails tests
        run: make test-rails
